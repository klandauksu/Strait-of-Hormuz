function lerp(a,b,t){return a+(b-a)*t}
function dst(a,b,c,d){return Math.sqrt((a-c)**2+(b-d)**2)}

// ══════════ DRAW TANKER (canvas, overhead) ══════════
// Draws an overhead oil tanker at the current canvas origin (caller should translate first).
// w = half-width, h = half-height, color = hull color, tanks = number of tank domes, t = animation time
function drawTanker(ctx,w,h,color,tanks,t){
  // Shadow
  ctx.fillStyle="rgba(0,0,0,0.22)";ctx.beginPath();ctx.ellipse(2,3,w+2,h*0.35,0,0,Math.PI*2);ctx.fill();
  // Hull — rectangular with rounded bow
  const hGrad=ctx.createLinearGradient(-w,0,w,0);
  hGrad.addColorStop(0,color+"88");hGrad.addColorStop(0.5,color);hGrad.addColorStop(1,color+"88");
  ctx.fillStyle=hGrad;
  ctx.beginPath();
  ctx.moveTo(-w*0.85,-h);// port bow start
  ctx.quadraticCurveTo(-w*0.2,-h*1.08,0,-h*1.05);// bow curve port
  ctx.quadraticCurveTo(w*0.2,-h*1.08,w*0.85,-h);// bow curve starboard
  ctx.lineTo(w,-h*0.85);// starboard forward shoulder
  ctx.lineTo(w,h*0.8);// starboard side
  ctx.quadraticCurveTo(w*0.9,h,0,h);// stern curve
  ctx.quadraticCurveTo(-w*0.9,h,-w,h*0.8);// stern curve port
  ctx.lineTo(-w,-h*0.85);// port side
  ctx.closePath();ctx.fill();
  // Deck — dark brown flat area
  ctx.fillStyle="rgba(60,35,20,0.65)";
  const deckTop=-h*0.75,deckBot=h*0.45,deckW=w*0.78;
  ctx.beginPath();ctx.moveTo(-deckW,deckTop);ctx.lineTo(deckW,deckTop);
  ctx.lineTo(deckW,deckBot);ctx.lineTo(-deckW,deckBot);ctx.closePath();ctx.fill();
  // Pipe manifold — center line
  ctx.strokeStyle="rgba(150,130,100,0.5)";ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,deckTop+2);ctx.lineTo(0,deckBot-2);ctx.stroke();
  // Tank domes — circles along the deck
  const tankArea=deckBot-deckTop-6,tankR=Math.min(deckW*0.55,(tankArea/tanks)*0.42);
  for(let i=0;i<tanks;i++){
    const ty=deckTop+3+tankR+(i*(tankArea-tankR*2)/(Math.max(1,tanks-1)));
    ctx.fillStyle="rgba(40,40,50,0.7)";ctx.beginPath();ctx.arc(0,ty,tankR,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle="rgba(80,80,90,0.5)";ctx.lineWidth=0.8;ctx.stroke();
    // Highlight
    ctx.fillStyle="rgba(255,255,255,0.06)";ctx.beginPath();ctx.arc(-tankR*0.25,ty-tankR*0.25,tankR*0.4,0,Math.PI*2);ctx.fill();
  }
  // Bridge / superstructure at stern
  const brW=w*0.55,brH=h*0.22,brY=h*0.5;
  ctx.fillStyle="rgba(180,185,195,0.7)";
  ctx.fillRect(-brW/2,brY,brW,brH);
  ctx.fillStyle="rgba(140,200,255,0.3)";// windows
  ctx.fillRect(-brW/2+2,brY+1,brW-4,brH*0.4);
  // Funnel/mast
  ctx.fillStyle="rgba(100,100,110,0.8)";ctx.fillRect(-2,brY-3,4,4);
  // Navigation lights
  const blink=Math.sin((t||0)*6)>0;
  ctx.fillStyle=blink?"#0f0":"#060";ctx.fillRect(w-2,-h*0.5,3,3);
  ctx.fillStyle=blink?"#f00":"#600";ctx.fillRect(-w-1,-h*0.5,3,3);
}

// ══════════ SHIP GRAPHIC ══════════
function ShipGraphic({shipKey,width=280,showLabel=true}){
  const s=SHIPS[shipKey];if(!s)return null;
  const{tanks,h}=s.silhouette,vw=300,vh=100,hullW=40+tanks*30,hullH=20+h*25,sx=(vw-hullW)/2,sy=vh/2-hullH/2+5;
  return(<svg viewBox={"0 0 "+vw+" "+vh} style={{width,display:"block"}}>
    <rect x="0" y={sy+hullH*0.6} width={vw} height={vh-sy-hullH*0.6} fill="#0a2744" opacity="0.4"/>
    <path d={"M"+(sx+10)+","+(sy+hullH*0.6)+" L"+sx+","+(sy+hullH*0.35)+" L"+(sx+hullW*0.08)+","+sy+" L"+(sx+hullW*0.92)+","+sy+" L"+(sx+hullW)+","+(sy+hullH*0.35)+" L"+(sx+hullW-10)+","+(sy+hullH*0.6)+" Z"} fill={s.color} stroke="rgba(0,0,0,0.2)" strokeWidth="0.5" opacity="0.85"/>
    <rect x={sx+hullW*0.08} y={sy-3} width={hullW*0.84} height={4} fill="#d4a574" rx="1"/>
    {Array.from({length:tanks}).map((_,i)=>{const tw=(hullW*0.75)/tanks-3,tx=sx+hullW*0.12+i*((hullW*0.75)/tanks);return <rect key={i} x={tx} y={sy-8} width={tw} height={6} fill="#444" rx="2" stroke="#555" strokeWidth="0.3"/>})}
    <rect x={sx+hullW*0.78} y={sy-20} width={hullW*0.15} height={17} fill="#bbb" rx="1.5"/>
    <line x1={sx+hullW*0.84} y1={sy-20} x2={sx+hullW*0.84} y2={sy-30} stroke="#888" strokeWidth="1"/>
    {showLabel&&<text x={vw/2} y={vh-4} fill={s.color} fontSize="10" textAnchor="middle" fontFamily={S.font} fontWeight="bold">{s.name} - {s.lengthM}m</text>}
  </svg>);
}

// ══════════ SVG MAP ══════════
function GameMap({originId,progress,events,eventIdx,selected,onSelect,mode}){
  const route=originId?ROUTES[originId]:null;
  let shipX=50,shipY=50;
  if(route&&progress!=null){
    const t=clamp(progress,0,1);
    const si=Math.min(Math.floor(t*(route.length-1)),route.length-2);
    const st=(t*(route.length-1))-si;
    shipX=lerp(route[si].x,route[si+1].x,st);
    shipY=lerp(route[si].y,route[si+1].y,st);
  }
  const hov=useRef(null);const[hovId,setHovId]=useState(null);
  return(<div>
    <svg viewBox="0 0 100 80" style={{width:"100%",flex:1,display:"block",margin:"0 auto",borderRadius:10,border:"1px solid "+S.border,background:"url('map-bg.png') center/contain no-repeat, #081020"}}>
      {/* Map background is provided by map-bg.png — coastlines, labels, and fleet ships are baked in */}
      {/* Route line */}
      {route&&<polyline points={route.map(p=>p.x+","+p.y).join(" ")} fill="none" stroke={S.accent} strokeWidth="0.8" strokeDasharray="2,2" opacity="0.3"/>}
      {/* Event markers on route */}
      {route&&events&&events.map((ev,i)=>{
        const evT=(i+0.5)/events.length;
        const ei=Math.min(Math.floor(evT*(route.length-1)),route.length-2);
        const et=(evT*(route.length-1))-ei;
        const ex=lerp(route[ei].x,route[ei+1].x,et);
        const ey=lerp(route[ei].y,route[ei+1].y,et);
        const done=i<eventIdx;
        return <g key={i}><circle cx={ex} cy={ey} r="1.8" fill={done?"rgba(46,204,113,0.2)":i===eventIdx?S.accent+"44":"rgba(231,76,60,0.2)"} stroke={done?S.green:i===eventIdx?S.accent:S.red} strokeWidth="0.3"/><text x={ex} y={ey+0.7} textAnchor="middle" fontSize="2">{ev.emoji}</text></g>;
      })}
      {/* Port markers */}
      {ORIGINS.map(o=>{
        const isH=hovId===o.id,isS=selected===o.id;
        return <g key={o.id} style={{cursor:mode==="select"?"pointer":"default"}} onMouseEnter={()=>setHovId(o.id)} onMouseLeave={()=>setHovId(null)} onClick={()=>mode==="select"&&onSelect&&onSelect(o.id)}>
          {(isH||isS)&&<circle cx={o.mapX} cy={o.mapY} r="3" fill="none" stroke={o.color} strokeWidth="0.3" opacity="0.5"><animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite"/></circle>}
          <circle cx={o.mapX} cy={o.mapY} r={isS?2:isH?1.5:1} fill={(isH||isS)?o.color:"#fff"} stroke={o.color} strokeWidth="0.3" opacity={(isH||isS)?1:0.5}/>
          <text x={o.mapX} y={o.mapY-3} fill={(isH||isS)?"#fff":"#8899aa"} fontSize={(isH||isS)?"2":"1.6"} textAnchor="middle" fontFamily="monospace">{o.name}</text>
        </g>;
      })}
      {/* Ship position */}
      {route&&progress!=null&&<g>
        <circle cx={shipX} cy={shipY} r="2" fill={S.accent} opacity="0.3"><animate attributeName="r" values="1.5;3;1.5" dur="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.4;0.1;0.4" dur="2s" repeatCount="indefinite"/></circle>
        <circle cx={shipX} cy={shipY} r="1.2" fill={S.accent} stroke="#fff" strokeWidth="0.3"/>
        <text x={shipX} y={shipY-3} textAnchor="middle" fill="#fff" fontSize="1.6" fontFamily="monospace">{SHIPS[Object.keys(SHIPS)[0]]&&"▶"}</text>
      </g>}
    </svg>
    {/* Info panel for hovered/selected port */}
    {mode==="select"&&(hovId||selected)&&(()=>{
      const o=ORIGINS.find(p=>p.id===(hovId||selected));if(!o)return null;
      return <div style={{...card,marginTop:10,borderColor:o.color+"44"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:6}}>
          <span style={{fontSize:26}}>{o.flag}</span>
          <div><div style={{fontFamily:S.titleFont,fontSize:16,color:o.color,fontWeight:"bold"}}>{o.name}, {o.country}</div>
          <div style={{fontSize:12,color:S.dim}}>{o.oilType} | Buy ${o.price} → Sell ${o.sellPrice}/bbl</div></div>
        </div>
        <p style={{fontSize:13,color:S.text,lineHeight:1.6,margin:"4px 0"}}>{o.desc}</p>
        <div style={{display:"flex",gap:14,fontSize:12,marginTop:6,flexWrap:"wrap"}}>
          <span style={{color:o.cargoBonus>1?S.green:"#8ac"}}>Cargo {o.cargoBonus>1?"+"+((o.cargoBonus-1)*100).toFixed(0)+"%":"Base"}</span>
          <span style={{color:o.riskMod>1?S.red:S.green}}>Risk {o.riskMod>1?"+"+((o.riskMod-1)*100).toFixed(0)+"%":"-"+((1-o.riskMod)*100).toFixed(0)+"%"}</span>
          <span style={{color:S.green}}>Margin ${o.sellPrice-o.price}/bbl</span>
        </div>
      </div>;
    })()}
    {/* Progress bar for sailing */}
    {progress!=null&&<div style={{marginTop:8}}>
      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:S.dim}}><span>Departure</span><span>Strait</span><span>US Fleet</span></div>
      <div style={{background:"rgba(255,255,255,0.06)",borderRadius:4,height:8,overflow:"hidden",marginTop:2}}>
        <div style={{width:(clamp(progress,0,1)*100)+"%",height:"100%",background:"linear-gradient(90deg,"+S.accent+","+S.green+")",borderRadius:4,transition:"width 0.5s"}}/>
      </div>
      <div style={{textAlign:"center",fontSize:12,color:S.dim,marginTop:4}}>Transit: {(clamp(progress,0,1)*100).toFixed(0)}%</div>
    </div>}
  </div>);
}

// ══════════ MINEFIELD GAME (30s, ship-size hitbox) ══════════
function MineFieldGame({onComplete,agility,equip,shipKey}){

  const s=SHIPS[shipKey]||SHIPS.suezmax;
  useEffect(()=>{
    const W=420,H=500,canvas=ref.current;canvas.width=W;canvas.height=H;const ctx=canvas.getContext("2d");

    for(let i=0;i<20;i++)g.mines.push({x:Math.random()*(W-50)+25,y:-Math.random()*900-80,r:10+Math.random()*7,hit:false,hitTimer:0});
    const kd=e=>{g.keys[e.key]=true;if(["ArrowLeft","ArrowRight","ArrowUp","ArrowDown","a","d","w","s"].includes(e.key))e.preventDefault()};
    const ku=e=>{g.keys[e.key]=false};
    window.addEventListener("keydown",kd);window.addEventListener("keyup",ku);
    let tch=null;
    const ts=e=>{tch={x:e.touches[0].clientX,y:e.touches[0].clientY};e.preventDefault()};
    const te=()=>{tch=null};
    canvas.addEventListener("touchstart",ts,{passive:false});canvas.addEventListener("touchmove",ts,{passive:false});canvas.addEventListener("touchend",te);
    let lastFrame=performance.now();
    const loop=(now)=>{
      if(!g.active)return;
      const dt=Math.min((now-lastFrame)/16.67,3);lastFrame=now;
      g.elapsed=(now-g.startTime)/1000;
      const progress=g.elapsed/TOTAL_S;
      const inSafe=g.elapsed>=SAFE_S,safeProg=inSafe?(g.elapsed-SAFE_S)/(TOTAL_S-SAFE_S):0;
      const animT=g.elapsed*60;
      // Screen shake
      g.shk*=Math.pow(0.88,dt);const sx=(Math.random()-0.5)*g.shk,sy=(Math.random()-0.5)*g.shk;
      ctx.save();ctx.translate(sx,sy);
      // Ocean gradient
      const bg=ctx.createLinearGradient(0,0,0,H);
      bg.addColorStop(0,inSafe?"#081a30":"#040e1f");bg.addColorStop(1,inSafe?"#0e2848":"#081828");
      ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
      // Animated wave lines
      ctx.strokeStyle="rgba(30,80,140,0.1)";ctx.lineWidth=1;
      for(let i=0;i<14;i++){ctx.beginPath();const wy=i*(H/13)+Math.sin(animT*0.018+i)*6;for(let x=0;x<=W;x+=8){const y=wy+Math.sin(x*0.025+animT*0.012+i*2)*4;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.stroke()}
      // Movement
      if(g.keys["ArrowLeft"]||g.keys["a"])g.ship.x-=spd*dt;if(g.keys["ArrowRight"]||g.keys["d"])g.ship.x+=spd*dt;
      if(g.keys["ArrowUp"]||g.keys["w"])g.ship.y-=spd*0.7*dt;if(g.keys["ArrowDown"]||g.keys["s"])g.ship.y+=spd*0.7*dt;
      if(tch){const r=canvas.getBoundingClientRect();g.ship.x+=((tch.x-r.left)/r.width*W-g.ship.x)*0.06*dt;g.ship.y+=((tch.y-r.top)/r.height*H-g.ship.y)*0.04*dt}
      g.ship.x=clamp(g.ship.x,hbW,W-hbW);g.ship.y=clamp(g.ship.y,44,H-25);
      // Wake trail
      if(Math.random()<0.5)g.wake.push({x:g.ship.x+(Math.random()-0.5)*hbW*0.6,y:g.ship.y+hbH*0.7,l:18,sz:1.5+Math.random()*2.5});
      g.wake=g.wake.filter(w=>{w.l-=dt;w.y+=0.4*dt;w.sz+=0.06*dt;ctx.fillStyle="rgba(160,210,255,"+(w.l/18)*0.18+")";ctx.beginPath();ctx.arc(w.x,w.y,w.sz,0,Math.PI*2);ctx.fill();return w.l>0});
      // Mines
      const ms=(0.7+g.elapsed*0.03)*dt;
      g.mines.forEach(m=>{if(m.hit){m.hitTimer-=dt;if(m.hitTimer<=0){m.hit=false;if(g.elapsed<SAFE_S){m.y=-60;m.x=Math.random()*(W-50)+25}else m.y=H+999}return}m.y+=ms;
        if(m.y>H+30){if(inSafe){m.y=H+999;return}m.y=-50-Math.random()*120;m.x=Math.random()*(W-50)+25;g.dodged++}
        if(m.y>H+50)return;
        const dx=Math.abs(g.ship.x-m.x),dy=Math.abs(g.ship.y-m.y);
        if(dx<m.r+hbW&&dy<m.r+hbH){
          m.hit=true;m.hitTimer=30;g.hits++;g.shk=16;
          for(let p=0;p<18;p++)g.particles.push({x:m.x,y:m.y,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,l:28+Math.random()*12,c:["#ff6b35","#ffcc00","#ff4444","#fff8e0"][p%4],sz:2+Math.random()*3});
          for(let p=0;p<8;p++)g.particles.push({x:m.x,y:m.y,vx:(Math.random()-0.5)*3,vy:-2-Math.random()*4,l:22,c:"rgba(120,190,255,0.5)",sz:1.5+Math.random()*2});
        }

        ctx.fillStyle="rgba(90,30,30,0.12)";ctx.beginPath();ctx.arc(m.x,m.y,m.r*2.2,0,Math.PI*2);ctx.fill();
        // Chain

        ctx.beginPath();ctx.moveTo(m.x,m.y+m.r);ctx.lineTo(m.x+Math.sin(animT*0.02)*3,m.y+m.r+28);ctx.stroke();ctx.setLineDash([]);
        // Mine body

          ctx.fillStyle="#666";ctx.beginPath();ctx.arc(hx,hy,3,0,Math.PI*2);ctx.fill();ctx.fillStyle="#999";ctx.beginPath();ctx.arc(hx,hy,1.3,0,Math.PI*2);ctx.fill()}
        // Blinking indicator
        ctx.fillStyle="#e74c3c";ctx.globalAlpha=0.5+Math.sin(animT*0.08+m.x)*0.5;
        ctx.beginPath();ctx.arc(m.x,m.y-m.r*0.35,2.5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
        // Proximity warning

        if(d<dr){const a=(1-d/dr);ctx.strokeStyle="rgba(231,76,60,"+a*0.45+")";ctx.lineWidth=det>1?2.5:1.5;ctx.beginPath();ctx.arc(m.x,m.y,m.r+5,0,Math.PI*2);ctx.stroke();
          ctx.strokeStyle="rgba(231,76,60,"+a*0.12+")";ctx.lineWidth=1;ctx.beginPath();ctx.arc(m.x,m.y,m.r+9+Math.sin(animT*0.12)*3,0,Math.PI*2);ctx.stroke()}
      });
      // Particles
      g.particles=g.particles.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=0.04*dt;p.l-=dt;ctx.fillStyle=p.c;ctx.globalAlpha=clamp(p.l/18,0,1);ctx.beginPath();ctx.arc(p.x,p.y,p.sz,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;return p.l>0});
      // Clear waters message
      if(g.elapsed>SAFE_S-5&&!inSafe){ctx.fillStyle="rgba(46,204,113,"+(Math.sin(animT*0.1)*0.3+0.5)+")";ctx.font="bold 14px monospace";ctx.textAlign="center";ctx.fillText("▼ CLEAR WATERS AHEAD ▼",W/2,56);ctx.textAlign="start"}
      if(inSafe&&safeProg>0.5){ctx.fillStyle="rgba(46,204,113,"+clamp(safeProg*2-0.5,0,1)+")";ctx.font="bold 20px monospace";ctx.textAlign="center";ctx.fillText("— SAFE WATERS —",W/2,H/2-15);ctx.font="14px monospace";ctx.fillText("Minefield cleared",W/2,H/2+10);ctx.textAlign="start"}
      // Ship — tanker shape
      ctx.save();ctx.translate(g.ship.x,g.ship.y);
      drawTanker(ctx,hbW,hbH,s.color,s.silhouette.tanks,animT*0.05);
      ctx.restore();
      // HUD
      ctx.fillStyle="rgba(4,14,31,0.88)";ctx.fillRect(0,0,W,42);
      ctx.strokeStyle="rgba(80,120,180,0.2)";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,42);ctx.lineTo(W,42);ctx.stroke();
      const tl=Math.max(0,Math.ceil(TOTAL_S-g.elapsed));
      ctx.fillStyle=tl<=5?S.red:S.accent;ctx.font="bold 17px monospace";ctx.textAlign="right";ctx.fillText(tl+"s",W-14,28);ctx.textAlign="start";
      ctx.fillStyle="#fff";ctx.font="bold 13px monospace";ctx.fillText("Dodged: "+g.dodged,14,17);
      ctx.fillStyle=g.hits>=2?S.red:g.hits>=1?S.accent:"#ccc";ctx.fillText("Hits: "+g.hits+"/3",14,34);
      ctx.fillStyle="rgba(255,255,255,0.07)";ctx.fillRect(W*0.32,8,W*0.33,4);
      ctx.fillStyle=inSafe?S.green:S.accent;ctx.fillRect(W*0.32,8,W*0.33*clamp(progress,0,1),4);
      ctx.fillStyle=S.green;ctx.fillRect(W*0.32+W*0.33*(SAFE_S/TOTAL_S)-1,6,2,8);
      ctx.fillStyle="rgba(255,255,255,0.06)";ctx.fillRect(W*0.32,16,W*0.33,4);
      const hpPct=clamp(1-g.hits/3,0,1);ctx.fillStyle=hpPct>0.6?S.green:hpPct>0.3?S.accent:S.red;
      ctx.fillRect(W*0.32,16,W*0.33*hpPct,4);
      ctx.fillStyle="rgba(255,255,255,0.2)";ctx.font="9px monospace";ctx.fillText(s.name,W*0.32,34);
      ctx.restore();
      if(g.hits>=3||g.elapsed>=TOTAL_S){g.active=false;onComplete({success:g.hits<2,hullDmg:Math.round((g.hits===0?0:g.hits===1?15:g.hits===2?25:40)*arm),cargoLoss:(g.hits<=1?0:g.hits===2?0.05:0.12)*arm,repairCost:g.hits>0?200000*g.hits:0,msg:g.hits===0?"Perfect!":g.hits===1?"Minor damage.":g.hits===2?"Hull breached.":"Critical damage."});return}
      requestAnimationFrame(loop);
    };requestAnimationFrame(loop);
    return()=>{g.active=false;window.removeEventListener("keydown",kd);window.removeEventListener("keyup",ku);canvas.removeEventListener("touchstart",ts);canvas.removeEventListener("touchmove",ts);canvas.removeEventListener("touchend",te)};
  },[]);

}

// ══════════ IRGC FAST BOATS (evade pursuers) ══════════

          const edge=Math.random();if(edge<0.5){nearest.x=edge<0.25?-20:W+20;nearest.y=Math.random()*H*0.5}else{nearest.x=Math.random()*W;nearest.y=-20}

// ══════════ DRONE TAP ══════════

    g.spawnQueue.sort((a,b)=>a-b);

      const x=30+Math.random()*(W-60),y=50+Math.random()*80;
      const orbitR=20+Math.random()*30,orbitSpd=0.5+Math.random()*1.5,orbitPhase=Math.random()*Math.PI*2;
      g.drones.push({id,x,y,baseX:x,baseY:y,orbitR,orbitSpd,orbitPhase,

      }

    const killDrone=(d,source)=>{
      d.alive=false;d.state="dead";g.kills++;
      for(let j=0;j<12;j++){const a=Math.random()*Math.PI*2,v=1+Math.random()*3;
        g.particles.push({x:d.x,y:d.y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:1,
          sz:2+Math.random()*3,c:["#ff4444","#ff8800","#ffcc00"][Math.floor(Math.random()*3)],type:"fire"})}
      if(source==="ciws"){
        // CIWS tracer burst
        for(let t=0;t<3;t++){g.particles.push({x:SHIP.x+(Math.random()-0.5)*20,y:SHIP.y-20,
          x2:d.x+(Math.random()-0.5)*8,y2:d.y+(Math.random()-0.5)*8,life:0.6,c:"#44ff44",sz:1.5,type:"tracer"})}}

    let lastFrame=performance.now();

            for(let j=0;j<20;j++){const a=Math.random()*Math.PI*2,v=1+Math.random()*4;
              g.particles.push({x:SHIP.x,y:SHIP.y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,life:1,

        }
        // Update trail

        ctx.translate(sx,sy);g.shk*=Math.pow(0.88,dt)}
      // Sky gradient
      const sky=ctx.createLinearGradient(0,0,0,H);
      sky.addColorStop(0,"#0a1628");sky.addColorStop(0.6,"#162844");sky.addColorStop(1,"#1a3050");
      ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
      // Stars
      ctx.fillStyle="rgba(255,255,255,0.3)";
      for(let i=0;i<30;i++){const sx=(i*137.5)%W,sy=(i*97.3)%H*0.4;
        ctx.fillRect(sx,sy,1,1)}
      // Ocean at bottom
      const ocean=ctx.createLinearGradient(0,H-80,0,H);
      ocean.addColorStop(0,"#0b2040");ocean.addColorStop(1,"#061530");
      ctx.fillStyle=ocean;ctx.fillRect(0,H-80,W,80);
      // Wave lines

      for(let w=0;w<3;w++){ctx.beginPath();
        for(let x=0;x<W;x+=4){ctx.lineTo(x,H-70+w*15+Math.sin(x*0.02+g.elapsed*2+w)*4)}ctx.stroke()}

          ctx.fillStyle="#ffcc00";ctx.beginPath();ctx.arc(0,8,1.5,0,Math.PI*2);ctx.fill()}

        }
      });

        ctx.fillStyle="#3a5a3a";ctx.fillRect(-1,-dsH*0.85-4,2,5)}

            ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.lineTo(p.x2,p.y2);ctx.stroke();
            ctx.fillStyle="#fff";ctx.beginPath();ctx.arc(p.x2,p.y2,2,0,Math.PI*2);ctx.fill()}}
        else if(p.type==="jam"){p.life-=0.03*dt;
          if(p.life>0){ctx.globalAlpha=p.life*0.3;ctx.strokeStyle=p.c;ctx.lineWidth=2;
            ctx.beginPath();ctx.arc(p.x,p.y,p.sz*(2-p.life),0,Math.PI*2);ctx.stroke()}}
        else{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=0.06*dt;p.life-=0.025*dt;
          if(p.life>0){ctx.globalAlpha=p.life;ctx.fillStyle=p.c;
            ctx.beginPath();ctx.arc(p.x,p.y,p.sz*p.life,0,Math.PI*2);ctx.fill()}}
      });
      g.particles=g.particles.filter(p=>p.life>0);
      ctx.globalAlpha=1;
      // Hit flash overlay
      if(g.flash>0){ctx.globalAlpha=g.flash*0.3;ctx.fillStyle="#e74c3c";ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;g.flash*=Math.pow(0.9,dt)}
      // ── HUD ──
      ctx.fillStyle="rgba(4,10,20,0.85)";ctx.fillRect(0,0,W,34);
      ctx.strokeStyle="rgba(100,160,220,0.15)";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,34);ctx.lineTo(W,34);ctx.stroke();
      // Kill counter
      ctx.fillStyle="#2ecc71";ctx.font="bold 11px monospace";
      ctx.fillText("KILLS:"+g.kills+"/"+totalDrones,8,14);
      // Hits
      ctx.fillStyle=g.hits>2?"#e74c3c":"#ff8844";ctx.fillText("HITS:"+g.hits,8,28);
      // Ammo
      if(rounds>0){ctx.fillStyle=g.ammo>0?"#ff8844":"#444";ctx.font="bold 10px monospace";ctx.fillText("💥"+g.ammo+" tap",130,14)}
      // CIWS indicator
      if(hasCIWS){ctx.fillStyle=g.ciwsCooldown<=0?"#44ff44":"#2a4a2a";ctx.font="bold 10px monospace";
        ctx.fillText("🔫 CIWS"+(g.ciwsCooldown<=0?" RDY":" "+(Math.ceil(g.ciwsCooldown/15))+"s"),130,28)}
      // Active drones
      const alive=g.drones.filter(d=>d.alive).length;const pending=g.spawnQueue.length;
      ctx.fillStyle=S.accent;ctx.fillText("INCOMING:"+(alive+pending),250,14);
      // Timer — shows countdown while spawning, then "CLEAR!" when spawn done
      const timeLeft=Math.max(0,Math.ceil(GAME_TIME-g.elapsed));
      ctx.font="bold 16px "+S.titleFont;ctx.textAlign="right";
      if(timeLeft>0){ctx.fillStyle=timeLeft<=5?"#e74c3c":S.accent;ctx.fillText(timeLeft+"s",W-10,22)}
      else{ctx.fillStyle="#ff8844";ctx.fillText("CLEAR!",W-10,22)}
      ctx.textAlign="left";
      // Progress bar
      const progPct=Math.min(1,g.elapsed/GAME_TIME);
      ctx.fillStyle="rgba(255,255,255,0.06)";ctx.fillRect(0,H-4,W,4);
      ctx.fillStyle=S.accent;ctx.fillRect(0,H-4,W*progPct,4);
      ctx.restore(); // screen shake
      // End condition — all spawned drones killed or impacted (timer only stops spawning)
      const allDone=g.spawnQueue.length===0&&g.drones.length>0&&g.drones.every(d=>!d.alive);
      if(allDone){
        g.active=false;
        const survived=g.hits;const pct=g.kills/totalDrones;
        onComplete({success:pct>=0.6,
          hullDmg:Math.round((survived===0?0:survived<=2?10:survived<=4?20:35)*arm),
          cargoLoss:(survived===0?0:survived<=2?0.03:survived<=4?0.08:0.15)*arm,
          repairCost:survived*80000,
          msg:survived===0?"All drones neutralized! Zero impacts.":survived<=2?g.kills+" kills. "+survived+" got through.":survived+" impacts. Deck heavily damaged."});
        return;
      }
      requestAnimationFrame(loop);
    };requestAnimationFrame(loop);
    return()=>{g.active=false;canvas.removeEventListener("click",cc)};
  },[]);
  return <canvas ref={ref} style={{borderRadius:8,border:"1px solid rgba(100,160,220,0.15)",cursor:"crosshair"}}/>;
}

// ══════════ RADIO SCAN (moving target) ══════════
function RadioScanGame({onComplete,shipName,isSanctioned}){
  const[initTarget]=useState(()=>15+Math.random()*20);
  const[freq,setFreq]=useState(50);
  const[time,setTime]=useState(14);const[holdTime,setHoldTime]=useState(0);const[done,setDone]=useState(false);const[locked,setLocked]=useState(false);
  const[targetPos,setTargetPos]=useState(()=>initTarget);const[chars,setChars]=useState(0);
  const doneRef=useRef(false);const freqRef=useRef(50);const targetRef=useRef(initTarget);const holdRef=useRef(0);const charsRef=useRef(0);
  const waveRef=useRef(null);
  const fullMsg="USS CARNEY USS CARNEY THIS IS "+shipName.toUpperCase()+" // POS 26-15N 056-30E // INBOUND STRAIT OF HORMUZ // REQUEST TRANSIT CORRIDOR ASSIGNMENT // CARGO: "+(isSanctioned?"[IRANIAN ORIGIN — OFAC SANCTIONED CRUDE]":"CRUDE OIL — CLEAN MANIFEST")+" // SOULS ON BOARD 28 // OVER";
  // Moving target
  useEffect(()=>{if(done)return;const iv=setInterval(()=>{setTargetPos(t=>{const speed=0.8+Math.random()*0.4;const dir=Math.sin(Date.now()*0.001)*speed;const nv=clamp(t+dir,15,85);targetRef.current=nv;return nv})},100);return()=>clearInterval(iv)},[done]);
  const diff=Math.abs(freq-targetPos),sig=Math.max(0,1-diff/25);
  // Countdown + hold + message reveal
  useEffect(()=>{if(done)return;const iv=setInterval(()=>{
    const curDiff=Math.abs(freqRef.current-targetRef.current),curSig=Math.max(0,1-curDiff/25);
    if(curDiff<4){holdRef.current+=1;setHoldTime(holdRef.current);
      if(holdRef.current>=3&&!doneRef.current){doneRef.current=true;setLocked(true);setDone(true);return}}
    else{holdRef.current=0;setHoldTime(0)}
    // Reveal message chars based on signal quality
    if(curSig>0.5){const add=Math.floor(curSig*12);charsRef.current=Math.min(charsRef.current+add,fullMsg.length);setChars(charsRef.current)}
    setTime(t=>{if(t<=1){if(!doneRef.current){doneRef.current=true;setDone(true)}return 0}return t-1});
  },1000);return()=>clearInterval(iv)},[done]);
  // Smooth char reveal between ticks
  useEffect(()=>{if(done)return;const iv=setInterval(()=>{const curSig=Math.max(0,1-Math.abs(freqRef.current-targetRef.current)/25);
    if(curSig>0.4){charsRef.current=Math.min(charsRef.current+1,fullMsg.length);setChars(charsRef.current)}},150);return()=>clearInterval(iv)},[done]);
  const lockedRef=useRef(false);useEffect(()=>{lockedRef.current=locked},[locked]);
  useEffect(()=>{if(done){const d=Math.abs(freqRef.current-targetRef.current);const sanPen=isSanctioned?0.08:0;
    onComplete({success:lockedRef.current||d<6,hullDmg:0,cargoLoss:sanPen,
      repairCost:lockedRef.current?0:d<6?50000:250000,
      msg:lockedRef.current?("Comms locked! Navy verified."+(isSanctioned?" ⚠️ Sanctions flag — cargo manifest under review. "+((sanPen*100).toFixed(0))+"% held for inspection.":"")):d<6?("Partial signal. Brief delay."+(isSanctioned?" Sanctioned cargo flagged.":"")):"Failed. Navy boarded you."+(isSanctioned?" Sanctioned cargo seized.":"")})}},[done]);
  const onFreqChange=e=>{const v=Number(e.target.value);freqRef.current=v;setFreq(v)};
  // Waveform canvas
  useEffect(()=>{const c=waveRef.current;if(!c)return;c.width=320;c.height=60;const ctx=c.getContext("2d");let af;
    const draw=()=>{ctx.fillStyle="#030d08";ctx.fillRect(0,0,320,60);
      // Scanlines
      ctx.fillStyle="rgba(0,255,60,0.02)";for(let i=0;i<30;i++)ctx.fillRect(0,i*2,320,1);
      const curSig=Math.max(0,1-Math.abs(freqRef.current-targetRef.current)/25);
      // Waveform
      ctx.strokeStyle=curSig>0.8?"rgba(0,255,80,0.9)":curSig>0.4?"rgba(0,200,100,0.6)":"rgba(0,120,80,0.3)";
      ctx.lineWidth=curSig>0.8?2:1.5;ctx.beginPath();
      for(let x=0;x<320;x++){const noise=curSig<0.3?(Math.random()-0.5)*40:(Math.random()-0.5)*5;
        const wave=Math.sin(x*0.04+Date.now()*0.005)*15*curSig;
        const y=30+wave+noise;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}
      ctx.stroke();
      // Center line
      ctx.strokeStyle="rgba(0,255,80,0.08)";ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,30);ctx.lineTo(320,30);ctx.stroke();
      // Signal peak indicator
      if(curSig>0.7){ctx.fillStyle="rgba(0,255,80,"+(0.1+curSig*0.2)+")";ctx.fillRect(0,0,320,60)}
      af=requestAnimationFrame(draw)};
    draw();return()=>cancelAnimationFrame(af)},[]);
  const lockPct=holdTime/3*100;
  const termStyle={background:"#030d08",border:"1px solid rgba(0,180,60,0.2)",borderRadius:6,padding:"10px 12px",fontFamily:"'Courier New',monospace",fontSize:11,color:sig>0.6?"#0f0":"#0a5",lineHeight:1.6,minHeight:60,position:"relative",overflow:"hidden"};
  return(<div style={{...card,borderColor:sig>0.8?"rgba(0,200,80,0.4)":"rgba(26,140,255,0.25)",background:"rgba(4,12,20,0.95)"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
      <div style={{color:S.blue,fontWeight:"bold",fontSize:15}}>📻 USS CARNEY — CH 16 VHF</div>
      <div style={{color:time<=3?S.red:S.accent,fontWeight:"bold",fontSize:18,fontFamily:S.titleFont}}>{time}s</div>
    </div>
    {isSanctioned&&<div style={{background:"rgba(231,76,60,0.1)",border:"1px solid rgba(231,76,60,0.25)",borderRadius:4,padding:"4px 8px",fontSize:11,color:S.red,textAlign:"center",marginBottom:8}}>⚠️ SANCTIONED CARGO — Navy will flag Iranian-origin crude on manifest</div>}
    <canvas ref={waveRef} style={{width:"100%",height:50,borderRadius:4,display:"block",marginBottom:8,border:"1px solid rgba(0,180,60,0.15)"}}/>
    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:6}}>
      <div style={{flex:1}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#0a5",marginBottom:2}}><span>2MHz</span><span>FREQ: {(2+freq*0.26).toFixed(1)}MHz</span><span>28MHz</span></div>
        <input type="range" min="0" max="100" value={freq} onChange={onFreqChange} style={{width:"100%",accentColor:sig>0.8?"#0f0":sig>0.4?S.accent:"#555"}}/>
      </div>
      <div style={{textAlign:"center",minWidth:60}}>
        <div style={{fontSize:10,color:"#0a5",textTransform:"uppercase"}}>Signal</div>
        <div style={{fontSize:20,fontWeight:"bold",color:sig>0.8?"#0f0":sig>0.5?S.accent:S.red,fontFamily:S.titleFont}}>{(sig*100).toFixed(0)}%</div>
      </div>
    </div>
    <div style={{display:"flex",gap:6,marginBottom:8}}>
      {[0,1,2].map(i=><div key={i} style={{flex:1,height:6,borderRadius:3,background:holdTime>i?"#0f0":"rgba(0,255,80,0.1)",transition:"background 0.3s",boxShadow:holdTime>i?"0 0 8px rgba(0,255,80,0.4)":"none"}}/>)}
      <div style={{fontSize:11,color:holdTime>=3?"#0f0":"#0a5",fontWeight:"bold",minWidth:50,textAlign:"right"}}>{holdTime>=3?"LOCKED":"LOCK "+holdTime+"/3"}</div>
    </div>
    <div style={termStyle}>
      {sig<0.3&&<div style={{position:"absolute",inset:0,background:"repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px)",pointerEvents:"none"}}/>}
      <span style={{color:"#0a5"}}>TX&gt; </span>
      <span style={{color:sig>0.6?"#0f0":"#0a5",textShadow:sig>0.8?"0 0 6px rgba(0,255,80,0.5)":"none"}}>{fullMsg.slice(0,chars)}</span>
      {chars<fullMsg.length&&<span style={{animation:"blink 0.6s infinite",color:"#0f0"}}>█</span>}
      {chars>=fullMsg.length&&<span style={{color:"#0f0",fontWeight:"bold"}}> ✓ TRANSMITTED</span>}
      <style>{"@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}"}</style>
    </div>
    {locked&&<div style={{textAlign:"center",marginTop:8,color:"#0f0",fontWeight:"bold",fontSize:14,textShadow:"0 0 10px rgba(0,255,80,0.5)"}}>✓ FREQUENCY LOCKED — NAVY ACKNOWLEDGED</div>}
  </div>);
}

// ══════════ NEGOTIATION (2 per game limit enforced in main) ══════════
function NegotiationGame({onComplete,equip,onFatalFail,currentCargoPercent}){
  const hasInterp=equip.includes("interpreter"),hasE=equip.includes("escort"),hasM=equip.includes("medic");
  const MOVES=["rock","paper","scissors"];
  const ICONS={rock:"✊",paper:"✋",scissors:"✌️"};
  const BEATS={rock:"scissors",paper:"rock",scissors:"paper"};
  const LABELS={rock:"Force",paper:"Diplomacy",scissors:"Deception"};
  const COLORS={rock:S.red,paper:S.green,scissors:"#9b59b6"};
  const[commander]=useState(()=>{
    const names=["Cpt. Rostami","Cdr. Jalili","Lt. Mohammadi","Cdr. Salehi","Cpt. Rezaei"];
    return{name:names[Math.floor(Math.random()*names.length)],portrait:"😠"};
  });
  const[round,setRound]=useState(0);// 0=intro
  const[maxRounds]=useState(3);
  const[wins,setWins]=useState(0);
  const[losses,setLosses]=useState(0);
  const[phase,setPhase]=useState("intro");// intro, hint, choose, reveal, outcome
  const[cmdMove,setCmdMove]=useState(null);
  const[playerMove,setPlayerMove]=useState(null);
  const[hint,setHint]=useState(null);
  const[roundResult,setRoundResult]=useState(null);
  const[finalResult,setFinalResult]=useState(null);
  const[typedText,setTypedText]=useState("");
  const typeRef=useRef(null);const timerRef=useRef(null);
  const taunts=["You think you can outsmart the Revolutionary Guard?","Your papers are suspicious, Captain.","Let's settle this the old way.","I've seen through cleverer captains than you.","This won't go the way you think."];
  const winLines=["Lucky. But luck runs out.","Hmph. You won't be so fortunate next time.","A minor setback."];
  const loseLines=["As expected. You're outmatched.","The Guard always wins.","Pathetic attempt, Captain."];
  const tieLines=["Evenly matched... for now.","A stalemate. Again.","We think alike. Dangerous."];
  const typeText=(text,cb)=>{
    let i=0;setTypedText("");
    clearInterval(typeRef.current);
    typeRef.current=setInterval(()=>{i++;setTypedText(text.slice(0,i));if(i>=text.length){clearInterval(typeRef.current);if(cb)cb()}},25);
  };
  // Start intro
  useEffect(()=>{
    const line="⚡ "+commander.name+" blocks your path. \""+taunts[Math.floor(Math.random()*taunts.length)]+"\"";
    typeText(line,()=>setPhase("ready"));
    return()=>{clearInterval(typeRef.current);clearTimeout(timerRef.current)};
  },[]);
  const startRound=()=>{
    const rnd=round+1;setRound(rnd);setPlayerMove(null);setCmdMove(null);setRoundResult(null);setHint(null);
    const cm=MOVES[Math.floor(Math.random()*3)];
    setCmdMove(cm);
    if(hasInterp){
      // 75% correct hint, 25% wrong
      const correct=Math.random()<0.75;
      const hintMove=correct?cm:MOVES.filter(m=>m!==cm)[Math.floor(Math.random()*2)];
      setHint(hintMove);
      typeText("🗣️ Interpreter whispers: \"I think he'll play "+LABELS[hintMove]+" "+ICONS[hintMove]+"...\"",()=>setPhase("choose"));
    }else{
      typeText("Round "+rnd+" of "+maxRounds+" — Choose your move!",()=>setPhase("choose"));
    }
  };
  const handleChoice=(move)=>{
    if(phase!=="choose")return;
    setPlayerMove(move);setPhase("reveal");
    const cm=cmdMove;
    let res;
    if(move===cm)res="tie";
    else if(BEATS[move]===cm)res="win";
    else res="lose";
    setRoundResult(res);
    const newWins=wins+(res==="win"?1:0);
    const newLosses=losses+(res==="lose"?1:0);
    setWins(newWins);setLosses(newLosses);
    const line=res==="win"?winLines[Math.floor(Math.random()*winLines.length)]:
               res==="lose"?loseLines[Math.floor(Math.random()*loseLines.length)]:
               tieLines[Math.floor(Math.random()*tieLines.length)];
    typeText(commander.name+": \""+line+"\"",()=>{
      // Check if game over (round already incremented by startRound)
      if(round>=maxRounds||newWins>=2||newLosses>=2){
        timerRef.current=setTimeout(()=>resolveGame(newWins,newLosses),1500);
      }else{
        setPhase("next");
      }
    });
  };
  const resolveGame=(w,l)=>{
    setPhase("outcome");
    let out;
    if(w>l){
      out={success:true,cargoLoss:0,hullDmg:0,fatal:false,emoji:"🕊️",title:"PASSAGE GRANTED",
        msg:commander.name+" grudgingly waves you through. \"Go. Before I change my mind.\"",color:S.green};
    }else if(w===l){
      const seizure=0.1+Math.random()*0.1;
      out={success:true,cargoLoss:seizure,hullDmg:5,fatal:false,emoji:"🤝",title:"GRUDGING RELEASE",
        msg:"A draw. "+commander.name+" 'inspects' ~"+Math.round(seizure*100)+"% of cargo before letting you pass.",color:S.accent};
    }else{
      // Player lost
      if(hasM){
        out={success:false,cargoLoss:0.6,hullDmg:35,fatal:false,emoji:"💀",title:"BOARDED — MEDIC SAVES CREW",
          msg:commander.name+" orders boarding. Your medic prevents casualties but 60% cargo seized.",color:S.red};
      }else{
        out={success:false,cargoLoss:1,hullDmg:50,fatal:true,emoji:"💀",title:"VESSEL SEIZED",
          msg:commander.name+" signals the gunboat. All cargo confiscated. Crew detained.",color:S.red};
      }
    }
    setFinalResult(out);
    timerRef.current=setTimeout(()=>{
      if(out.fatal)onFatalFail();
      else onComplete({success:out.success,hullDmg:out.hullDmg,cargoLoss:out.cargoLoss,repairCost:0,msg:out.msg});
    },3500);
  };
  const scoreColor=(w,l)=>w>l?S.green:w===l?S.accent:S.red;
  return(<div style={{...card,borderColor:S.accent+"44",position:"relative",overflow:"hidden"}}>
    <div style={{textAlign:"center",color:S.accent,fontWeight:"bold",fontSize:18,marginBottom:6}}>⚓ IRGC STANDOFF</div>
    {/* Commander + score */}
    <div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8,padding:"8px 12px",background:"rgba(255,255,255,0.03)",borderRadius:8}}>
      <div style={{fontSize:40,lineHeight:1}}>{commander.portrait}</div>
      <div style={{flex:1}}>
        <div style={{fontSize:14,fontWeight:"bold",color:S.text}}>{commander.name}</div>
        <div style={{fontSize:11,color:S.dim}}>IRGC Naval Patrol</div>
      </div>
      {round>0&&<div style={{textAlign:"right"}}>
        <div style={{fontSize:10,color:S.dim,textTransform:"uppercase",letterSpacing:1}}>Round {Math.min(round,maxRounds)}/{maxRounds}</div>
        <div style={{fontSize:14,fontWeight:"bold",color:scoreColor(wins,losses)}}>{wins} — {losses}</div>
      </div>}
    </div>
    {/* Dialogue */}
    <div style={{minHeight:60,padding:"10px 12px",background:"rgba(0,0,0,0.2)",borderRadius:8,marginBottom:10,border:"1px solid rgba(255,255,255,0.05)"}}>
      <div style={{fontSize:13,color:S.text,lineHeight:1.6}}>
        <span style={{color:S.accent}}>📻 </span>{typedText}<span style={{opacity:0.5,animation:"blink 0.8s infinite"}}>▌</span>
      </div>
    </div>
    {/* Interpreter badge */}
    {hasInterp&&round===0&&<div style={{display:"flex",gap:6,justifyContent:"center",marginBottom:8}}>
      <span style={{fontSize:10,color:S.blue,background:"rgba(26,140,255,0.1)",padding:"2px 8px",borderRadius:10}}>🗣️ Interpreter (reads opponent)</span>
    </div>}
    {/* Ready button (after intro) */}
    {phase==="ready"&&<div style={{textAlign:"center",marginTop:8}}>
      <button onClick={startRound} style={{background:S.accent,color:"#070d1a",border:"none",borderRadius:8,padding:"10px 28px",fontSize:15,fontWeight:"bold",cursor:"pointer",fontFamily:S.font}}>Begin Challenge ▶</button>
    </div>}
    {/* Move selection */}
    {phase==="choose"&&<div>
      <div style={{fontSize:11,color:S.dim,textAlign:"center",marginBottom:8}}>Choose your move:</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
        {MOVES.map(m=><button key={m} onClick={()=>handleChoice(m)}
          style={{background:"rgba(255,255,255,0.04)",border:"2px solid "+COLORS[m]+"66",borderRadius:10,padding:"12px 6px",cursor:"pointer",textAlign:"center",transition:"all 0.15s"}}>
          <div style={{fontSize:36}}>{ICONS[m]}</div>
          <div style={{fontSize:12,fontWeight:"bold",color:COLORS[m],marginTop:4}}>{LABELS[m]}</div>
        </button>)}
      </div>
      {hint&&<div style={{textAlign:"center",marginTop:8,fontSize:11,color:S.blue,fontStyle:"italic"}}>
        🗣️ Hint: {LABELS[hint]} {ICONS[hint]}
      </div>}
    </div>}
    {/* Reveal */}
    {(phase==="reveal"||phase==="next")&&playerMove&&cmdMove&&<div>
      <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:24,margin:"12px 0"}}>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:44}}>{ICONS[playerMove]}</div>
          <div style={{fontSize:11,color:S.text,marginTop:4}}>You</div>
          <div style={{fontSize:10,color:COLORS[playerMove]}}>{LABELS[playerMove]}</div>
        </div>
        <div style={{fontSize:20,color:S.dim}}>vs</div>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:44}}>{ICONS[cmdMove]}</div>
          <div style={{fontSize:11,color:S.text,marginTop:4}}>{commander.name.split(" ")[0]}</div>
          <div style={{fontSize:10,color:COLORS[cmdMove]}}>{LABELS[cmdMove]}</div>
        </div>
      </div>
      <div style={{textAlign:"center",fontSize:16,fontWeight:"bold",marginBottom:4,
        color:roundResult==="win"?S.green:roundResult==="lose"?S.red:S.accent}}>
        {roundResult==="win"?"YOU WIN!":roundResult==="lose"?"YOU LOSE":"DRAW"}
      </div>
      {phase==="next"&&<div style={{textAlign:"center",marginTop:8}}>
        <button onClick={startRound} style={{background:S.accent,color:"#070d1a",border:"none",borderRadius:8,padding:"8px 22px",fontSize:13,fontWeight:"bold",cursor:"pointer",fontFamily:S.font}}>Next Round ▶</button>
      </div>}
    </div>}
    {/* Final outcome */}
    {phase==="outcome"&&finalResult&&<div style={{textAlign:"center",padding:"10px 0"}}>
      <div style={{fontSize:48}}>{finalResult.emoji}</div>
      <div style={{fontSize:18,fontWeight:"bold",color:finalResult.color,marginBottom:4}}>{finalResult.title}</div>

      <div style={{fontSize:11,color:S.dim,marginTop:4}}>Final: {wins} wins — {losses} losses</div>
    </div>}
    <style>{`@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}`}</style>
  </div>);
}

// ══════════ MAIN GAME ══════════
function Game(){
  const[phase,setPhase]=useState("title");
  const[testGame,setTestGame]=useState(null);const[testShip,setTestShip]=useState("suezmax");const[testResult,setTestResult]=useState(null);
  const[testEquip,setTestEquip]=useState([]);const[testFlares,setTestFlares]=useState(3);const[testRounds,setTestRounds]=useState(5);
  const[ship,setShip]=useState(null);const[origin,setOrigin]=useState(null);const[selOrigin,setSelOrigin]=useState(null);
  const[equipment,setEquipment]=useState([]);const[flareCount,setFlareCount]=useState(0);const[roundCount,setRoundCount]=useState(0);const[cargo,setCargo]=useState(1);
  const[hullHP,setHullHP]=useState(100);const[maxHull,setMaxHull]=useState(100);
  const[repairCosts,setRepairCosts]=useState(0);const[eventLog,setEventLog]=useState([]);
  const[currentEvent,setCurrentEvent]=useState(null);const[eventResult,setEventResult]=useState(null);
  const[eventIndex,setEventIndex]=useState(0);const[sailProgress,setSailProgress]=useState(0);
  const[catastrophe,setCatastrophe]=useState(null);const[gameOver,setGameOver]=useState(false);
  const[negotiationsUsed,setNegotiationsUsed]=useState(0);
  const[playerName,setPlayerName]=useState("");
  const[miniGameStarted,setMiniGameStarted]=useState(false);
  const sailRef=useRef(null);const eventsRef=useRef([]);
  const equipCost=equipment.reduce((s,id)=>s+(EQUIPMENT.find(e=>e.id===id)?.cost||0),0)+flareCount*25000+roundCount*15000;

  const initEvents=useCallback(()=>{
    let pool=[...EVENTS].sort(()=>Math.random()-0.5).filter(e=>Math.random()<e.probability).slice(0,6);
    // Cap negotiations at 2
    let negCount=0;
    pool=pool.filter(e=>{if(e.miniGame==="negotiate"){negCount++;return negCount<=2}return true});
    eventsRef.current=pool;
  },[]);

  const applyResult=(r)=>{
    if(r.cargoLoss)setCargo(c=>Math.max(0,c-r.cargoLoss));
    if(r.hullDmg)setHullHP(h=>{const nh=Math.max(0,h-r.hullDmg);if(nh<=0)setGameOver(true);return nh});
    if(r.repairCost)setRepairCosts(rc=>rc+r.repairCost);
  };

  const startSailing=useCallback((idx)=>{
    const nEv=Math.max(1,eventsRef.current.length);
    const startProg=idx===0?0:((idx-1)+0.5)/nEv;
    const endProg=idx>=nEv?1:(idx+0.5)/nEv;
    setPhase("sailing");setSailProgress(startProg);
    let ticks=0;const maxTicks=50+Math.random()*30;
    if(sailRef.current)clearInterval(sailRef.current);
    const catRoll=Math.random(),catAt=15+Math.floor(Math.random()*20);
    const arm=equipment.includes("armor")?0.6:1;
    sailRef.current=setInterval(()=>{
      ticks++;setSailProgress(Math.min(1,startProg+(ticks/maxTicks)*(endProg-startProg)));
      if(ticks===catAt&&catRoll<0.10){
        clearInterval(sailRef.current);
        const cat=CATASTROPHES[Math.floor(Math.random()*CATASTROPHES.length)];
        const hd=cat.fatal?999:Math.round(cat.hd*arm);const cl=cat.fatal?1:cat.cl*arm;
        setCatastrophe({...cat,hd,cl,rc:cat.rc});
        if(cat.fatal){setCargo(0);setHullHP(0);setGameOver(true)}else{applyResult({hullDmg:hd,cargoLoss:cl,repairCost:cat.rc})}
        setEventLog(l=>[...l,{event:"CATASTROPHE",success:false,text:cat.text,hullDmg:hd,cargoLoss:cl,repairCost:cat.rc}]);
        setPhase("catastrophe");return;
      }
      if(ticks>=maxTicks){clearInterval(sailRef.current);
        if(idx>=eventsRef.current.length)setPhase("finale");
        else{setCurrentEvent(eventsRef.current[idx]);setEventResult(null);setMiniGameStarted(false);setPhase("event")}
      }
    },80);
  },[equipment]);

  useEffect(()=>()=>{if(sailRef.current)clearInterval(sailRef.current)},[]);

  const handleMGC=(r)=>{applyResult(r);setEventLog(l=>[...l,{event:currentEvent.name,success:r.success,text:r.msg,hullDmg:r.hullDmg,cargoLoss:r.cargoLoss,repairCost:r.repairCost}]);
    if(r.cargoLoss>=1||hullHP<=0)setGameOver(true);
    setEventResult(r)};
  const handleNF=()=>{setCargo(0);setHullHP(0);setGameOver(true);setEventLog(l=>[...l,{event:currentEvent.name,success:false,text:"Fatal insult.",hullDmg:999,cargoLoss:1,repairCost:0}]);setEventResult({success:false,sunk:true,msg:"Vessel destroyed."})};
  const proceedEv=()=>{const next=eventIndex+1;setEventIndex(next);startSailing(next)};
  const proceedCat=()=>{if(gameOver){setPhase("endscreen");return}startSailing(eventIndex)};

  const od=origin?ORIGINS.find(o=>o.id===origin):null;
  const sd=ship?SHIPS[ship]:null;
  const startBbl=sd&&od?Math.round(sd.capacity*od.cargoBonus):0;
  const totalBbl=Math.round(startBbl*cargo);const lostBbl=startBbl-totalBbl;
  const pCost=startBbl*(od?.price||70);const rev=totalBbl*(od?.sellPrice||85);
  const fCost=Math.round((sd?.fuelBurn||50)*3.5*600);
  const netP=rev-pCost-equipCost-fCost-repairCosts;

  const reset=()=>{setPhase("title");setShip(null);setOrigin(null);setSelOrigin(null);setEquipment([]);setCargo(1);setHullHP(100);setMaxHull(100);setRepairCosts(0);setEventLog([]);setCurrentEvent(null);setEventResult(null);setEventIndex(0);setGameOver(false);setCatastrophe(null);setNegotiationsUsed(0)};

  // ── TITLE ──
  if(phase==="title")return(<div style={wrap}><div style={{textAlign:"center",paddingTop:30,maxWidth:500,margin:"0 auto"}}>
    <div style={{fontSize:56}}>🛢️</div>
    <h1 style={{fontFamily:S.titleFont,fontSize:28,color:S.accent,letterSpacing:2,textTransform:"uppercase"}}>Strait of Hormuz</h1>
    <p style={{color:S.dim,fontSize:11,letterSpacing:3,textTransform:"uppercase",marginTop:4}}>Oil Tanker Survival Game</p>
    <div style={{...card,textAlign:"left",marginTop:20}}>
      <p style={{fontSize:13,lineHeight:1.7,color:S.dim}}>Choose your tanker. Load crude. Navigate mini-games through the world's most dangerous shipping lane. Ship size affects hitbox — bigger ships are harder to maneuver.</p>
    </div>
    <div style={{marginTop:16}}>
      <input placeholder="Captain name (for leaderboard)" value={playerName} onChange={e=>setPlayerName(e.target.value)} style={{background:"rgba(255,255,255,0.05)",border:"1px solid "+S.border,borderRadius:8,padding:"10px 16px",color:"#fff",fontFamily:S.font,fontSize:14,width:"80%",marginBottom:12}}/>
    </div>

    <div style={{display:"flex",gap:10,justifyContent:"center",marginTop:12,flexWrap:"wrap"}}>

      <button onClick={()=>{setTestGame(null);setTestResult(null);setPhase("test_menu")}} style={{...btn("#3a5070",false),fontSize:12,padding:"8px 20px"}}>🎮 TEST MINIGAMES</button>
      <button onClick={()=>setPhase("debug_map")} style={{...btn("#3a5070",false),fontSize:12,padding:"8px 20px"}}>🗺️ MAP</button>
    </div>
    {/* Leaderboard */}
    {(()=>{const lb=getLeaderboard();if(!lb.length)return null;return <div style={{...card,marginTop:20,textAlign:"left"}}>

  // ── HOW TO PLAY ──
  if(phase==="howto"){
    const section=(title,icon,children)=><div style={{...card,borderColor:S.border}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>

    return(<div style={wrap}><div style={{maxWidth:520,margin:"0 auto",paddingBottom:40}}>
      <div style={{textAlign:"center",marginBottom:16}}>

        <h1 style={{fontFamily:S.titleFont,fontSize:24,color:S.accent,letterSpacing:2,textTransform:"uppercase",margin:"6px 0"}}>How to Play</h1>
        <p style={{color:S.dim,fontSize:11,letterSpacing:2,textTransform:"uppercase"}}>Survive the Strait. Deliver the Oil. Get Paid.</p>
      </div>

      {section("The Mission","🎯",<>
        <p style={{fontSize:13,color:S.text,lineHeight:1.8}}>You are the captain of an oil tanker navigating the <b style={{color:S.accent}}>Strait of Hormuz</b> — the most dangerous shipping lane on Earth. Load crude oil at a Persian Gulf terminal, survive the gauntlet of threats along the way, and deliver your cargo to the open ocean.</p>

      {section("Step 1: Choose Your Tanker","⚓",<>

      {section("Step 2: Pick Your Port","🏗️",<>
        <p style={{fontSize:13,color:S.text,lineHeight:1.7,marginBottom:6}}>Each loading terminal offers different oil grades, cargo bonuses, and risk levels.</p>
        <div style={{background:"rgba(255,255,255,0.03)",borderRadius:8,padding:10,fontSize:12,lineHeight:1.8}}>
          <span style={{color:S.green}}>🟢 Safe ports</span> — Lower risk, standard cargo<br/>
          <span style={{color:S.accent}}>🟡 Moderate ports</span> — Better prices, more danger<br/>

            <ellipse cx="1" cy="2" rx="9" ry="4.5" fill="rgba(0,0,0,0.3)"/>

            <rect x="-6" y="-3" width="12" height="2" fill="#fff"/>
            <rect x="-6" y="-1" width="12" height="2" fill="#da0000"/>

            <ellipse cx="0" cy="2" rx="10" ry="12" fill="#c49a6c"/>

  if(phase==="test_play"){

  </div></div>);

  if(phase==="setup_origin")return(<div style={wrap}><div style={{maxWidth:620,margin:"0 auto"}}>

  if(phase==="setup_equip"){const od2=ORIGINS.find(o=>o.id===origin);return(<div style={wrap}><div style={{maxWidth:600,margin:"0 auto"}}>

        <div style={{textAlign:"center"}}><span style={{fontSize:40}}>{currentEvent.emoji}</span>
        <h3 style={{fontFamily:S.titleFont,color:S.red,fontSize:20,margin:"6px 0"}}>{currentEvent.name}</h3></div>

        {currentEvent.miniGame==="sandstorm"&&<SandstormGame onComplete={handleMGC} agility={sd.maneuverability} equip={equipment} shipKey={ship}/>}
        {currentEvent.miniGame==="radio"&&<RadioScanGame onComplete={handleMGC} shipName={"MV "+sd.name} isSanctioned={origin==="kharg"||origin==="bandar"}/>}

      </div>}
    </>}
    {eventResult&&<div style={{...card,borderColor:eventResult.sunk?S.red:eventResult.success?S.green:S.accent,borderWidth:2,width:"100%"}}>
      <div style={{textAlign:"center"}}>
        <div style={{fontSize:40}}>{eventResult.sunk?"💀":eventResult.success?"✅":"💥"}</div>
        <p style={{fontSize:18,fontWeight:"bold",color:eventResult.sunk?S.red:eventResult.success?S.green:S.accent,margin:"6px 0"}}>{eventResult.sunk?"SUNK":eventResult.success?"SUCCESS":"DAMAGE"}</p>
        <p style={{fontSize:14,color:S.text}}>{eventResult.msg}</p>
      </div>
      <div style={{textAlign:"center",marginTop:12}}>
        {eventResult.sunk||gameOver?<button onClick={()=>setPhase("endscreen")} style={btn(S.red)}>FINAL ACCOUNTING</button>:
        <button onClick={proceedEv} style={btn()}>{eventIndex+1>=eventsRef.current.length?"🏁 EXIT STRAIT":"CONTINUE"}</button>}
      </div>
    </div>}
    </div>
  </div></div>);

  if(phase==="finale")return(<div style={gameWrap}><div style={{maxWidth:560,margin:"0 auto",width:"100%",flex:1,display:"flex",flexDirection:"column",minHeight:0,textAlign:"center"}}>
    <HUD/>
    <div style={fieldCenter}>
      <div style={{fontSize:48}}>🇺🇸</div>
      <h2 style={{fontFamily:S.titleFont,color:S.accent,fontSize:22}}>US NAVY ESCORT</h2>
      <p style={{color:S.dim,fontSize:14,lineHeight:1.7,margin:"12px 0"}}>USS Carney takes point. The open Indian Ocean beckons.</p>
      <GameMap originId={origin} progress={1} events={eventsRef.current} eventIdx={eventsRef.current.length} mode="sail"/>
      <button onClick={()=>{
        saveScore({name:playerName||"Anon",ship:sd?.name,origin:od?.name,profit:netP,cargo:(cargo*100).toFixed(0)+"%",date:new Date().toLocaleDateString()});
        setPhase("endscreen");
      }} style={{...btn(),marginTop:14}}>📊 FINAL ACCOUNTING</button>
    </div>
  </div></div>);

  if(phase==="endscreen"){
    const grade=gameOver?"F":cargo>0.9?"S":cargo>0.75?"A":cargo>0.5?"B":cargo>0.3?"C":"F";
    const gc={S:S.accent,A:S.green,B:"#4ecdc4",C:"#f39c12",F:S.red}[grade];
    const gl={S:"Maritime Legend",A:"Seasoned Captain",B:"Competent Skipper",C:"Lucky to Be Alive",F:gameOver?"Davy Jones' Locker":"Lloyd's Nightmare"}[grade];
    return(<div style={wrap}><div style={{maxWidth:600,margin:"0 auto"}}>
      <h2 style={{fontFamily:S.titleFont,color:S.accent,textAlign:"center",fontSize:22}}>{gameOver?"VOYAGE LOST":"VOYAGE COMPLETE"}</h2>
      <div style={{textAlign:"center",margin:"14px 0"}}><div style={{fontSize:56,fontWeight:"bold",color:gc,fontFamily:S.titleFont}}>{grade}</div><div style={{fontSize:16,color:gc,fontWeight:"bold"}}>{gl}</div></div>
      <div style={card}>
        <h3 style={{color:S.accent,fontSize:16,marginBottom:8,borderBottom:"1px solid "+S.border,paddingBottom:6}}>📊 PROFIT & LOSS</h3>
        <div style={{fontSize:14,lineHeight:2.4}}>
          <div style={{display:"flex",justifyContent:"space-between"}}><span>Starting</span><span>{startBbl.toLocaleString()} bbl</span></div>
          <div style={{display:"flex",justifyContent:"space-between"}}><span>Lost</span><span style={{color:S.red}}>-{lostBbl.toLocaleString()}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid "+S.border,paddingTop:4,fontWeight:"bold"}}><span>Delivered</span><span style={{color:S.green}}>{totalBbl.toLocaleString()} bbl</span></div>
          <div style={{borderTop:"1px solid "+S.border,marginTop:6,paddingTop:6}}>
            <div style={{display:"flex",justifyContent:"space-between"}}><span style={{color:S.dim}}>Purchase @${od?.price}</span><span style={{color:S.red}}>-${(pCost/1e6).toFixed(2)}M</span></div>
            <div style={{display:"flex",justifyContent:"space-between"}}><span>Delivery @${od?.sellPrice}</span><span style={{color:S.green}}>${(rev/1e6).toFixed(2)}M</span></div>
            <div style={{display:"flex",justifyContent:"space-between"}}><span>Equipment</span><span style={{color:S.red}}>-${(equipCost/1e6).toFixed(2)}M</span></div>
            <div style={{display:"flex",justifyContent:"space-between"}}><span>Fuel</span><span style={{color:S.red}}>-${(fCost/1e6).toFixed(2)}M</span></div>
            {repairCosts>0&&<div style={{display:"flex",justifyContent:"space-between"}}><span>Repairs</span><span style={{color:S.red}}>-${(repairCosts/1e6).toFixed(2)}M</span></div>}
            <div style={{display:"flex",justifyContent:"space-between",borderTop:"1px solid "+S.border,paddingTop:6,marginTop:6,fontWeight:"bold",fontSize:16}}>
              <span>NET PROFIT</span><span style={{color:netP>0?S.green:S.red}}>${(netP/1e6).toFixed(2)}M</span>
            </div>
          </div>
        </div>
      </div>
      <div style={card}>
        <h3 style={{color:S.accent,fontSize:16,marginBottom:8}}>📜 LOG</h3>
        {eventLog.map((e,i)=><div key={i} style={{fontSize:13,padding:"5px 0",borderBottom:"1px solid "+S.border}}>
          <span style={{color:e.success?S.green:S.red,fontWeight:"bold"}}>{e.success?"✓":"✗"}</span> <b>{e.event}</b>
          {e.hullDmg>0&&e.hullDmg<999&&<span style={{color:S.red}}> -{e.hullDmg}HP</span>}
          {e.cargoLoss>0&&e.cargoLoss<1&&<span style={{color:S.accent}}> -{(e.cargoLoss*100).toFixed(1)}%</span>}
          <div style={{color:S.dim,fontSize:12}}>{e.text}</div>
        </div>)}
      </div>
      {totalBbl>0&&<div style={card}>
        <h3 style={{color:S.accent,fontSize:16,marginBottom:8}}>🌍 PERSPECTIVE</h3>
        {Object.entries(CONSUMPTION).map(([k,c])=>{const mins=(totalBbl/c.daily)*1440,hrs=mins/60;
          return <div key={k} style={{marginBottom:6}}>
            <div style={{display:"flex",justifyContent:"space-between",fontSize:13}}><span>{c.emoji} {c.name}</span><span style={{color:S.accent}}>{hrs>=1?hrs.toFixed(1)+"h":Math.round(mins)+"min"}</span></div>
            <div style={{background:"#1a2d4a",borderRadius:3,height:5,overflow:"hidden"}}><div style={{width:Math.min(100,(mins/1440)*300)+"%",height:"100%",background:S.accent,borderRadius:3}}/></div>
          </div>})}
      </div>}
      <div style={{...card,textAlign:"center",border:"1px solid "+S.accent+"33",padding:24}}>
        <p style={{fontFamily:S.titleFont,fontSize:16,color:"#fff",lineHeight:1.8}}>The world is a complicated, sometimes terrible place.</p>
        <p style={{fontSize:13,color:S.dim,lineHeight:1.7,margin:"10px 0"}}>Real crews navigate these waters under real threats so we can drive to work and argue about gas prices.</p>
        <p style={{fontFamily:S.titleFont,fontSize:15,color:S.accent,lineHeight:1.8}}>But you can make it better. Go do one thing today to leave the world a little less terrible.</p>
      </div>
      <div style={{textAlign:"center",margin:"16px 0 30px"}}><button onClick={reset} style={btn("#3a5070",false)}>PLAY AGAIN</button></div>
    </div></div>);
  }
  return null;
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(Game));
</script>
</body>
</html>
